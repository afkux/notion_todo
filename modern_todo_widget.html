<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모던 Todo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Pretendard', sans-serif;
    background: linear-gradient(180deg, #e8eef7 0%, #d9e2f0 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  
  .phone {
    background: white;
    border-radius: 32px;
    width: 100%;
    max-width: 320px;
    padding: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    position: relative;
  }
  
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 8px 16px;
    border-bottom: 0.5px solid #efeff4;
  }
  
  .nav-arrow {
    background: none;
    border: none;
    color: #007aff;
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
  }
  
  .header-center {
    text-align: center;
  }
  
  .day-label {
    font-size: 11px;
    color: #8e8e93;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
  }
  
  .date-label {
    font-size: 13px;
    color: #1c1c1e;
    font-weight: 600;
    margin-top: 2px;
  }
  
  .title-row {
    padding: 16px 4px 12px;
  }
  
  .title {
    font-size: 26px;
    font-weight: 700;
    color: #1c1c1e;
    letter-spacing: -0.02em;
  }
  
  .subtitle {
    font-size: 12px;
    color: #8e8e93;
    margin-top: 2px;
  }
  
  .todo-list {
    display: flex;
    flex-direction: column;
    padding: 4px 0;
    min-height: 200px;
  }
  
  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 8px;
    border-bottom: 0.5px solid #efeff4;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  
  .todo-item:hover {
    background: #f9f9fb;
  }
  
  .todo-item:last-child { border-bottom: none; }
  
  .checkbox {
    width: 22px;
    height: 22px;
    border: 1.5px solid #c7c7cc;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  
  .todo-item.done .checkbox {
    background: #007aff;
    border-color: #007aff;
  }
  
  .todo-item.done .checkbox::after {
    content: '✓';
    color: white;
    font-size: 12px;
    font-weight: 700;
  }
  
  .todo-text {
    flex: 1;
    font-size: 15px;
    color: #1c1c1e;
    line-height: 1.3;
    word-break: break-all;
  }
  
  .todo-item.done .todo-text {
    color: #8e8e93;
    text-decoration: line-through;
  }
  
  .delete-btn {
    background: none;
    border: none;
    color: #c7c7cc;
    cursor: pointer;
    font-size: 18px;
    padding: 0 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  
  .todo-item:hover .delete-btn { opacity: 1; }
  
  .add-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 8px;
    margin-top: 8px;
    border-top: 0.5px solid #efeff4;
  }
  
  .add-icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #007aff;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    cursor: pointer;
    transition: transform 0.15s;
  }
  
  .add-icon:active { transform: scale(0.9); }
  
  .add-input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 15px;
    color: #1c1c1e;
    outline: none;
    font-family: inherit;
  }
  
  .add-input::placeholder { color: #c7c7cc; }
  
  .empty-state {
    text-align: center;
    padding: 40px 0;
    color: #c7c7cc;
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="top-bar">
    <button class="nav-arrow" id="prevBtn">‹</button>
    <div class="header-center">
      <div class="day-label" id="dayLabel">WEDNESDAY, FEB 4</div>
      <div class="date-label">To-Do List</div>
    </div>
    <button class="nav-arrow" id="nextBtn">›</button>
  </div>
  
  <div class="title-row">
    <div class="title">To-Do List</div>
    <div class="subtitle" id="counter">0 tasks left</div>
  </div>
  
  <div class="todo-list" id="todoList"></div>
  
  <div class="add-row">
    <div class="add-icon" id="addBtn">+</div>
    <input type="text" class="add-input" id="taskInput" placeholder="Add a new task..." maxlength="80">
  </div>
</div>

<script>
  const STORAGE_KEY = 'modern_todo_widget_v1';
  let currentDate = new Date();
  
  function dateKey(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  
  function loadAll() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
    catch(e) { return {}; }
  }
  
  function saveAll(data) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  }
  
  function getTodos() {
    const all = loadAll();
    return all[dateKey(currentDate)] || [];
  }
  
  function setTodos(list) {
    const all = loadAll();
    all[dateKey(currentDate)] = list;
    saveAll(all);
  }
  
  function render() {
    const days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    document.getElementById('dayLabel').textContent = 
      days[currentDate.getDay()] + ', ' + months[currentDate.getMonth()] + ' ' + currentDate.getDate();
    
    const todos = getTodos();
    const list = document.getElementById('todoList');
    list.innerHTML = '';
    
    if (todos.length === 0) {
      list.innerHTML = '<div class="empty-state">아직 할 일이 없어요</div>';
    } else {
      todos.forEach((t, i) => {
        const item = document.createElement('div');
        item.className = 'todo-item' + (t.done ? ' done' : '');
        item.innerHTML = `
          <div class="checkbox"></div>
          <span class="todo-text"></span>
          <button class="delete-btn">×</button>
        `;
        item.querySelector('.todo-text').textContent = t.text;
        item.addEventListener('click', (e) => {
          if (e.target.classList.contains('delete-btn')) {
            todos.splice(i, 1);
          } else {
            t.done = !t.done;
          }
          setTodos(todos);
          render();
        });
        list.appendChild(item);
      });
    }
    
    const left = todos.filter(t => !t.done).length;
    document.getElementById('counter').textContent = left + ' task' + (left !== 1 ? 's' : '') + ' left';
  }
  
  document.getElementById('addBtn').addEventListener('click', addTask);
  document.getElementById('taskInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addTask();
  });
  
  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) return;
    const todos = getTodos();
    todos.push({ text, done: false });
    setTodos(todos);
    input.value = '';
    render();
  }
  
  document.getElementById('prevBtn').addEventListener('click', () => {
    currentDate.setDate(currentDate.getDate() - 1);
    render();
  });
  
  document.getElementById('nextBtn').addEventListener('click', () => {
    currentDate.setDate(currentDate.getDate() + 1);
    render();
  });
  
  render();
</script>
</body>
</html>
