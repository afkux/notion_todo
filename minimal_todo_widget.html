<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미니멀 Todo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Segoe UI', sans-serif;
    background: transparent;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  
  .widget {
    background: #fafaf8;
    border-radius: 16px;
    width: 100%;
    max-width: 340px;
    padding: 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    border: 1px solid rgba(0,0,0,0.04);
  }
  
  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  
  .header-icon {
    color: #999;
    font-size: 18px;
  }
  
  .month-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  
  .month-label {
    font-size: 11px;
    color: #999;
    letter-spacing: 0.1em;
    font-weight: 500;
  }
  
  .nav-btn {
    background: none;
    border: none;
    color: #ccc;
    cursor: pointer;
    font-size: 14px;
    padding: 4px 8px;
    transition: color 0.2s;
  }
  
  .nav-btn:hover { color: #666; }
  
  .day-number {
    text-align: center;
    font-size: 42px;
    font-weight: 300;
    color: #333;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 20px;
  }
  
  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 0;
    border-bottom: 1px solid #e8e6e0;
    margin-bottom: 16px;
  }
  
  .input-row input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 14px;
    color: #333;
    outline: none;
    font-family: inherit;
  }
  
  .input-row input::placeholder {
    color: #bbb;
  }
  
  .add-btn {
    background: none;
    border: none;
    color: #999;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: color 0.2s;
  }
  
  .add-btn:hover { color: #333; }
  
  .todo-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 120px;
  }
  
  .todo-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: white;
    border-radius: 8px;
    border: 1px solid #ececec;
    font-size: 13px;
    color: #444;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  
  .todo-item:hover {
    border-color: #d4d4d4;
  }
  
  .todo-item.done {
    background: #2c2c2c;
    border-color: #2c2c2c;
    color: #fff;
  }
  
  .checkbox {
    width: 16px;
    height: 16px;
    border: 1.5px solid #d4d4d4;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  
  .todo-item.done .checkbox {
    background: #fff;
    border-color: #fff;
  }
  
  .todo-item.done .checkbox::after {
    content: '✓';
    color: #2c2c2c;
    font-size: 11px;
    font-weight: 700;
  }
  
  .todo-text {
    flex: 1;
    word-break: break-all;
  }
  
  .delete-btn {
    background: none;
    border: none;
    color: #ccc;
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  
  .todo-item:hover .delete-btn { opacity: 1; }
  .todo-item.done .delete-btn { color: rgba(255,255,255,0.5); }
  
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid #e8e6e0;
    font-size: 11px;
    color: #999;
  }
  
  .today-btn {
    background: none;
    border: none;
    color: #999;
    cursor: pointer;
    font-size: 11px;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }
  
  .today-btn:hover { color: #333; }
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <span class="header-icon">🤍</span>
  </div>
  
  <div class="month-row">
    <button class="nav-btn" id="prevBtn">‹</button>
    <span class="month-label" id="monthLabel">FEB 2026</span>
    <button class="nav-btn" id="nextBtn">›</button>
  </div>
  
  <div class="day-number" id="dayNumber">04</div>
  
  <div class="input-row">
    <input type="text" id="taskInput" placeholder="New task..." maxlength="60">
    <button class="add-btn" id="addBtn">ADD</button>
  </div>
  
  <div class="todo-list" id="todoList"></div>
  
  <div class="footer">
    <span id="counter">0 tasks left</span>
    <button class="today-btn" id="todayBtn">Today</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'minimal_todo_widget_v1';
  let currentDate = new Date();
  
  function dateKey(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  
  function loadAll() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    } catch(e) { return {}; }
  }
  
  function saveAll(data) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch(e) {}
  }
  
  function getTodos() {
    const all = loadAll();
    return all[dateKey(currentDate)] || [];
  }
  
  function setTodos(list) {
    const all = loadAll();
    all[dateKey(currentDate)] = list;
    saveAll(all);
  }
  
  function render() {
    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    document.getElementById('monthLabel').textContent = months[currentDate.getMonth()] + ' ' + currentDate.getFullYear();
    document.getElementById('dayNumber').textContent = String(currentDate.getDate()).padStart(2,'0');
    
    const todos = getTodos();
    const list = document.getElementById('todoList');
    list.innerHTML = '';
    
    todos.forEach((t, i) => {
      const item = document.createElement('div');
      item.className = 'todo-item' + (t.done ? ' done' : '');
      item.innerHTML = `
        <div class="checkbox"></div>
        <span class="todo-text"></span>
        <button class="delete-btn">×</button>
      `;
      item.querySelector('.todo-text').textContent = t.text;
      item.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-btn')) {
          todos.splice(i, 1);
          setTodos(todos);
          render();
        } else {
          t.done = !t.done;
          setTodos(todos);
          render();
        }
      });
      list.appendChild(item);
    });
    
    const left = todos.filter(t => !t.done).length;
    document.getElementById('counter').textContent = left + ' task' + (left !== 1 ? 's' : '') + ' left';
  }
  
  document.getElementById('addBtn').addEventListener('click', addTask);
  document.getElementById('taskInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addTask();
  });
  
  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) return;
    const todos = getTodos();
    todos.push({ text, done: false });
    setTodos(todos);
    input.value = '';
    render();
  }
  
  document.getElementById('prevBtn').addEventListener('click', () => {
    currentDate.setDate(currentDate.getDate() - 1);
    render();
  });
  
  document.getElementById('nextBtn').addEventListener('click', () => {
    currentDate.setDate(currentDate.getDate() + 1);
    render();
  });
  
  document.getElementById('todayBtn').addEventListener('click', () => {
    currentDate = new Date();
    render();
  });
  
  render();
</script>
</body>
</html>
